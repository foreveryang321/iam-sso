debug: false
server:
  port: 8080
spring:
  # 数据源配置
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa  # 默认用户名
    password: 123456    # 默认密码为空
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update  # 自动创建/更新表结构（开发环境用，生产环境建议用none）
    show-sql: true  # 显示SQL语句
    properties:
      hibernate:
        format_sql: true  # 格式化SQL语句
    database-platform: org.hibernate.dialect.H2Dialect  # H2方言
    # SQL初始化配置（核心）
  thymeleaf:
    enabled: true
    cache: false
    suffix: .html